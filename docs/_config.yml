title: OpenShift Agent Install
description: Documentation for OpenShift Agent-Based Installer
remote_theme: just-the-docs/just-the-docs
baseurl: "/openshift-agent-install"
url: "https://tosin2013.github.io"

# Repository settings
examples_repo: "https://github.com/tosin2013/openshift-agent-install/tree/main/examples"
repo_name: "tosin2013/openshift-agent-install"
branch: "main"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

# Just the Docs theme settings
color_scheme: dark
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Enable aux links (GitHub)
aux_links:
  "GitHub Repository":
    - "https://github.com/tosin2013/openshift-agent-install"

# Footer content
footer_content: "OpenShift Agent-Based Installer Documentation | <a href=\"https://github.com/tosin2013/openshift-agent-install\">View on GitHub</a>"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache
  - .sass-cache

# Default layout for pages
defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
    values:
      layout: default
