# Node Counts the installer will expect
control_plane_replicas: 3
app_node_replicas: 3

# nodes defines the nodes to use for the cluster
nodes:
  - hostname: master-0
    role: master
    rootDeviceHints:
      deviceName: /dev/vda
    interfaces:
      - name: enp1s0
        mac_address: "52:54:00:42:22:10"
      - name: enp2s0
        mac_address: "52:54:00:42:23:10"
    networkConfig:
      interfaces:
        - name: enp1s0
          type: ethernet
          state: up
          mac-address: "52:54:00:42:22:10"
          ipv4:
            enabled: false
          ipv6:
            enabled: false
        - name: enp1s0.1924
          type: vlan
          state: up
          vlan:
            id: 1924
            base-iface: enp1s0
          ipv4:
            enabled: true
            address:
              - ip: 192.168.50.10
                prefix-length: 24
            dhcp: false
      dns-resolver:
        config:
          server:
            - 192.168.122.1
      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: 192.168.50.1
            next-hop-interface: enp1s0.1924
            table-id: 254

