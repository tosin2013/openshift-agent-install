# Use Site Config
use_site_configs: false

# pull_secret path is the path to the pull-secret for the cluster
# For disconnected deployments, this must be a COMBINED pull secret with both
# Red Hat registry credentials AND your disconnected registry credentials
# See: https://github.com/kenmoini/disconnected-openshift/blob/main/scripts/join-auths.sh
pull_secret_path: ~/ocp-install-pull-secret-combined.json

# ssh_public_key_path is the path to the SSH public key to use for the cluster
# if this is not set then a new key pair will be generated
# ssh_public_key_path: ~/.ssh/id_rsa.pub

# Cluster metadata
base_domain: lab.example.com
cluster_name: ocp-4-21-ha

# platform_type is the type of platform to use for the cluster (baremetal, vsphere, none)
# For HA clusters with VIPs, use baremetal or vsphere
platform_type: baremetal

# VIPs - set as a list in case this is a dual-stack cluster
# For HA clusters, VIPs must be separate from node IPs
api_vips:
  - 192.168.200.50

app_vips:
  - 192.168.200.51

# Optional NTP Servers
ntp_servers:
  - 0.rhel.pool.ntp.org
  - 1.rhel.pool.ntp.org

# Optional DNS Server definitions
dns_servers:
  - 192.168.200.1

# cluster_network_cidr is the overall CIDR space for the Pods in the cluster
cluster_network_cidr: 10.128.0.0/14
# cluster_network_host_prefix is the number of bits in the cluster_network_cidr that are for each node
cluster_network_host_prefix: 23

# service_network_cidrs is the CIDR space for the Services in the cluster (ClusterIP/NodePort/LoadBalancer)
service_network_cidrs:
  - 172.30.0.0/16

# machine_network_cidr is the CIDR space for the Machines in the cluster
machine_network_cidrs:
  - 192.168.200.0/24

# networkType is the type of network to use for the cluster (OVNKubernetes)
# OpenShift 4.21 only supports OVNKubernetes (OpenShiftSDN removed)
network_type: OVNKubernetes

# rendezvous_ip is the IP address of the node that will be used for the bootstrap node
rendezvous_ip: 192.168.200.61

# Disconnected Registry Mirror configuration
# Replace registry.lab.example.com with your actual disconnected registry
disconnected_registries:
  # Must have a direct reference to the openshift-release-dev/ocp-release and openshift-release-dev/ocp-v4.0-art-dev paths
  - target: registry.lab.example.com/openshift/openshift-release-dev/ocp-release
    source: quay.io/openshift-release-dev/ocp-release
  - target: registry.lab.example.com/openshift/openshift-release-dev/ocp-v4.0-art-dev
    source: quay.io/openshift-release-dev/ocp-v4.0-art-dev

  # Mirror other required registries
  - target: registry.lab.example.com/quay-mirror
    source: quay.io
  - target: registry.lab.example.com/redhat-mirror
    source: registry.redhat.io
  - target: registry.lab.example.com/redhat-connect-mirror
    source: registry.connect.redhat.com

# Additional CA Root Trust Bundle
# Replace with your disconnected registry CA certificate
additional_trust_bundle_policy: Always
additional_trust_bundle: |
  -----BEGIN CERTIFICATE-----
  # Replace this with your actual disconnected registry CA certificate
  # This is a placeholder - you must provide your own CA cert
  # Example: cat /etc/pki/ca-trust/source/anchors/registry-ca.crt
  MIIDXTCCAkWgAwIBAgIJAKJ6qU7RqRfQMA0GCSqGSIb3DQEBCwUAMEUxCzAJBgNV
  BAYTAkFVMRMwEQYDVQQIDApTb21lLVN0YXRlMSEwHwYDVQQKDBhJbnRlcm5ldCBX
  aWRnaXRzIFB0eSBMdGQwHhcNMjQwMTAxMDAwMDAwWhcNMzQwMTAxMDAwMDAwWjBF
  MQswCQYDVQQGEwJBVTETMBEGA1UECAwKU29tZS1TdGF0ZTEhMB8GA1UECgwYSW50
  ZXJuZXQgV2lkZ2l0cyBQdHkgTHRkMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIB
  CgKCAQEA0p1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQR
  STUVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRST
  UVWXYZabcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVw
  -----END CERTIFICATE-----
