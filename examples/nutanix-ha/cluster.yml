# Use Site Config
use_site_configs: false

# pull_secret path is the path to the pull-secret for the cluster
pull_secret_path: /home/lab-user/pullsecret.json

# ssh_public_key_path is the path to the SSH public key to use for the cluster
# if this is not set then a new key pair will be generated
# ssh_public_key_path: ~/.ssh/id_rsa.pub

# Cluster metadata
base_domain: example.com
cluster_name: nutanix-ha

# OpenShift version (4.21+ recommended for Nutanix)
ocp_version: "4.21"

# platform_type: Nutanix platform
platform_type: nutanix

# Nutanix Prism Central connection
nutanix_prism_central_host: prism-central.example.com
nutanix_prism_central_port: 9440
nutanix_prism_central_username: admin
nutanix_prism_central_password: "changeme"

# Nutanix Prism Element configuration
nutanix_prism_element_host: prism-element.example.com
nutanix_prism_element_port: 9440
nutanix_prism_element_uuid: "00000000-0000-0000-0000-000000000000"

# Nutanix subnet UUIDs (list of subnet UUIDs to use)
nutanix_subnet_uuids:
  - "subnet-uuid-1234-5678-90ab-cdef"

# Optional: Custom cluster OS image URL
# nutanix_cluster_os_image: http://example.com/images/rhcos.qcow2

# VIPs - For HA, separate VIPs from node IPs
# Nutanix platform manages VIPs
api_vips:
  - 192.168.1.100

app_vips:
  - 192.168.1.101

# HA Configuration: 3 control plane, 2 workers
control_plane_replicas: 3
app_node_replicas: 2

# Optional NTP Servers
ntp_servers:
  - 0.rhel.pool.ntp.org
  - 1.rhel.pool.ntp.org

# Optional DNS Server definitions
dns_servers:
  - 192.168.1.1
dns_search_domains:
  - example.com

# cluster_network_cidr is the overall CIDR space for the Pods in the cluster
cluster_network_cidr: 10.128.0.0/14
# cluster_network_host_prefix is the number of bits in the cluster_network_cidr that are for each node
cluster_network_host_prefix: 23

# service_network_cidrs is the CIDR space for the Services in the cluster (ClusterIP/NodePort/LoadBalancer)
service_network_cidrs:
  - 172.30.0.0/16

# machine_network_cidr is the CIDR space for the Machines in the cluster
machine_network_cidrs:
  - 192.168.1.0/24

# networkType: OVNKubernetes is required for 4.21+
network_type: OVNKubernetes

# rendezvous_ip is the IP address of the first control plane node
rendezvous_ip: 192.168.1.110

# ZTP manifests (not typically used with Nutanix)
create_ztp_manifests: false

# cluster_architecture: x86_64 is standard for Nutanix
cluster_architecture: x86_64
