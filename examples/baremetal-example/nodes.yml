# Node Counts the installer will expect
control_plane_replicas: 3
app_node_replicas: 3
octect: 192.168.180
node_one_mac: EC:F4:BB:C0:B9:C8
node_two_mac: EC:F4:BB:C0:B9:C9
node_three_mac: EC:F4:BB:C0:B9:CA
node_four_mac: EC:F4:BB:C0:B9:CB
node_five_mac: EC:F4:BB:C0:B9:CC
node_six_mac: EC:F4:BB:C0:B9:CD

# nodes defines the nodes to use for the cluster
#
# BMC address schemes for real hardware:
#   iDRAC 9+ (Dell):  redfish-virtualmedia://10.0.1.10/redfish/v1/Systems/System.Embedded.1
#   HPE iLO:          redfish-virtualmedia://10.0.1.10/redfish/v1/Systems/1
#   Generic IPMI:     ipmi://10.0.1.10
#
# Remove or comment out the bmc: block when deploying to KVM (use deploy-on-kvm.sh instead).
# BMC credentials should be stored in Ansible Vault or exported as environment variables.
nodes:
  - hostname: node-1
    role: master
    # bmc:
    #   address: redfish-virtualmedia://192.168.180.10/redfish/v1/Systems/System.Embedded.1
    #   username: root
    #   password: "changeme"    # use Ansible Vault in production
    #   disableCertificateVerification: true
    rootDeviceHints:
      deviceName: /dev/nvme0n1
    interfaces:
      - name: eno1
        mac_address: "{{ node_one_mac }}"
    networkConfig:
      interfaces:
        - name: eno1
          type: ethernet
          state: up
          mac-address: "{{ node_one_mac }}"
          ipv4:
            enabled: true
            address:
              - ip: "{{ octect }}.21"
                prefix-length: 24
            dhcp: false
      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: "{{ octect }}.1"
            next-hop-interface: eno1
            table-id: 254
